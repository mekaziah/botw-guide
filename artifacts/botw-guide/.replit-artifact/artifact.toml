kind = "web"
previewPath = "/"
title = "Zelda: BotW Guide"
version = "1.0.0"
id = "artifacts/botw-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22720

[services.development]
run = "pnpm --filter @workspace/botw-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/botw-guide", "run", "build" ]
publicDir = "artifacts/botw-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22720"
BASE_PATH = "/"
